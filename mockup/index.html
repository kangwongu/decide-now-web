<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동전 던지기 - 고민 그만, 행동하자</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    /* === 리셋 & 기본 === */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #FFFDF7;
      --bg-card: #FFF9EB;
      --gold: #F59E0B;
      --gold-light: #FBBF24;
      --gold-dark: #D97706;
      --gold-shine: #FFE135;
      --blue: #3B82F6;
      --blue-light: #60A5FA;
      --text: #2E3A59;
      --text-sub: #6B7280;
      --text-light: #9CA3AF;
      --pink: #FCA5A5;
      --mint: #6EE7B7;
      --lavender: #C4B5FD;
      --coin-size: 200px;
    }

    body {
      font-family: 'Pretendard Variable', 'Pretendard', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* === 레이아웃 === */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
    }

    /* === 장식 도형 === */
    .deco {
      position: fixed;
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    .deco-1 {
      width: 120px; height: 120px;
      background: var(--gold-light);
      top: -20px; right: -30px;
      animation: floatDeco 6s ease-in-out infinite;
    }
    .deco-2 {
      width: 80px; height: 80px;
      background: var(--pink);
      top: 30%; left: -20px;
      border-radius: 70% 30% 50% 50% / 40% 60% 40% 60%;
      animation: floatDeco 5s ease-in-out infinite 1s;
    }
    .deco-3 {
      width: 60px; height: 60px;
      background: var(--mint);
      bottom: 20%; right: -10px;
      border-radius: 50% 50% 30% 70% / 60% 40% 60% 40%;
      animation: floatDeco 7s ease-in-out infinite 2s;
    }
    .deco-4 {
      width: 90px; height: 90px;
      background: var(--lavender);
      bottom: 5%; left: -25px;
      border-radius: 40% 60% 70% 30% / 50% 30% 70% 50%;
      animation: floatDeco 5.5s ease-in-out infinite 0.5s;
    }

    /* === 랜딩 페이지 === */
    #landing {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 0 40px;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #landing.hidden {
      opacity: 0;
      transform: translateY(-30px);
      pointer-events: none;
      position: absolute;
      inset: 0;
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 36px;
    }
    .hero-title {
      font-size: 36px;
      font-weight: 800;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 12px;
    }
    .hero-title .accent {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 16px;
      color: var(--text-sub);
      line-height: 1.6;
      font-weight: 400;
    }

    /* 캐릭터 동전 미리보기 */
    .coin-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .coin {
      width: var(--coin-size);
      height: var(--coin-size);
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-shine), var(--gold), var(--gold-dark));
      box-shadow:
        0 8px 32px rgba(245, 158, 11, 0.3),
        0 2px 8px rgba(0,0,0,0.1),
        inset 0 2px 4px rgba(255,255,255,0.4);
      position: relative;
      cursor: pointer;
      animation: float 3s ease-in-out infinite;
      transition: transform 0.2s ease;
    }
    .coin:hover { transform: scale(1.05); }
    .coin:active { transform: scale(0.97); }

    /* 동전 테두리 링 */
    .coin::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.45);
    }

    /* 동전 내부 원 */
    .coin-inner {
      position: absolute;
      inset: 16px;
      border-radius: 50%;
      background: linear-gradient(150deg, #FFE880, #F5B731);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    /* 캐릭터 얼굴 */
    .face { position: relative; width: 80px; height: 60px; }
    .eye {
      position: absolute;
      width: 10px; height: 12px;
      background: #5D4E37;
      border-radius: 50%;
      top: 8px;
    }
    .eye-left { left: 16px; }
    .eye-right { right: 16px; }

    /* 반짝이는 눈 하이라이트 */
    .eye::after {
      content: '';
      position: absolute;
      width: 4px; height: 4px;
      background: white;
      border-radius: 50%;
      top: 1px; right: 1px;
    }

    .cheek {
      position: absolute;
      width: 16px; height: 10px;
      background: rgba(252, 165, 165, 0.5);
      border-radius: 50%;
      top: 22px;
    }
    .cheek-left { left: 4px; }
    .cheek-right { right: 4px; }

    .mouth {
      position: absolute;
      width: 22px; height: 12px;
      border: 2.5px solid #5D4E37;
      border-top: none;
      border-radius: 0 0 50% 50%;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
    }

    .coin-label {
      font-size: 11px;
      font-weight: 600;
      color: #8B6914;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .coin-hint {
      margin-top: 16px;
      font-size: 14px;
      color: var(--text-light);
      text-decoration: underline wavy var(--gold-light);
      text-underline-offset: 4px;
    }

    /* 인용문 카드 */
    .quote-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 28px 24px;
      margin-bottom: 28px;
      position: relative;
      border: 1.5px solid rgba(245, 158, 11, 0.15);
    }
    .quote-card::before {
      content: '\201C';
      position: absolute;
      top: 12px; left: 16px;
      font-size: 48px;
      color: var(--gold-light);
      opacity: 0.5;
      line-height: 1;
      font-family: Georgia, serif;
    }
    .quote-text {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 12px;
      padding-left: 4px;
    }
    .quote-author {
      font-size: 13px;
      color: var(--text-sub);
      font-weight: 500;
    }
    .stat-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 6px 14px;
      background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(245,158,11,0.06));
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--gold-dark);
    }
    .stat-badge::before {
      content: '🎯';
      font-size: 14px;
    }

    /* CTA 버튼 */
    .cta-section { text-align: center; padding-bottom: 20px; }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(245, 158, 11, 0.35);
      transition: all 0.2s ease;
      font-family: inherit;
      letter-spacing: 0.3px;
    }
    .cta-btn:hover {
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 10px 32px rgba(245, 158, 11, 0.45);
    }
    .cta-btn:active { transform: scale(0.97); }
    .cta-btn .coin-icon { font-size: 22px; }

    /* === 동전 뒤집기 화면 === */
    #flip-screen {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #flip-screen.hidden {
      opacity: 0;
      transform: translateY(30px);
      pointer-events: none;
      position: absolute;
      inset: 0;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 24px;
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: var(--text-sub);
      padding: 8px;
      border-radius: 12px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .back-btn:hover { background: rgba(0,0,0,0.05); }

    .guidance {
      text-align: center;
      margin-bottom: 40px;
      transition: opacity 0.4s ease;
    }
    .guidance-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .guidance-sub {
      font-size: 14px;
      color: var(--text-light);
    }

    /* 뒤집기용 동전 */
    .flip-coin-wrapper {
      perspective: 1000px;
      margin-bottom: 40px;
    }
    .flip-coin {
      --coin-size: 250px;
      width: var(--coin-size);
      height: var(--coin-size);
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.3s ease;
    }
    .flip-coin.flipping {
      animation: coinFlip 2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }

    .flip-coin-face {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 8px 32px rgba(245, 158, 11, 0.3),
        0 2px 8px rgba(0,0,0,0.1),
        inset 0 2px 4px rgba(255,255,255,0.4);
    }

    .coin-front {
      background: linear-gradient(135deg, var(--gold-shine), var(--gold), var(--gold-dark));
    }
    .coin-front::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.45);
    }
    .coin-front .coin-inner-flip {
      position: absolute;
      inset: 16px;
      border-radius: 50%;
      background: linear-gradient(150deg, #FFE880, #F5B731);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .coin-back {
      background: linear-gradient(135deg, #E8B84B, #C9952A, #A67B1E);
      transform: rotateY(180deg);
    }
    .coin-back::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.3);
    }
    .coin-back .coin-inner-flip {
      position: absolute;
      inset: 16px;
      border-radius: 50%;
      background: linear-gradient(150deg, #D4A94B, #B8892F);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* 뒷면 캐릭터 (고민 얼굴) */
    .face-back .eye { background: #6B5A3E; }
    .face-back .eye-left { top: 12px; }
    .face-back .eye-right { top: 12px; }
    .face-back .mouth {
      width: 18px; height: 8px;
      border: 2.5px solid #6B5A3E;
      border-bottom: none;
      border-top: 2.5px solid #6B5A3E;
      border-radius: 50% 50% 0 0;
      bottom: 10px;
    }

    .coin-label-flip {
      font-size: 12px;
      font-weight: 700;
      color: #8B6914;
      letter-spacing: 2px;
      margin-top: 4px;
    }
    .coin-back .coin-label-flip { color: #7A6120; }

    /* 결과 영역 */
    .result {
      text-align: center;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .result.hidden { visibility: hidden; }
    .result-text {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .result-text.show {
      opacity: 1;
      transform: scale(1);
    }
    .result-text.heads { color: var(--gold-dark); }
    .result-text.tails { color: #8B6914; }

    .result-message {
      font-size: 15px;
      color: var(--text-sub);
      line-height: 1.5;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.4s ease 0.2s;
    }
    .result-message.show {
      opacity: 1;
      transform: translateY(0);
    }

    .result-encourage {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-light);
      font-style: italic;
      opacity: 0;
      transition: opacity 0.4s ease 0.5s;
    }
    .result-encourage.show { opacity: 1; }

    /* 액션 버튼 */
    .actions {
      display: flex;
      gap: 12px;
    }
    .flip-btn {
      padding: 14px 32px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 16px rgba(245, 158, 11, 0.3);
      transition: all 0.2s ease;
    }
    .flip-btn:hover {
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 8px 24px rgba(245, 158, 11, 0.4);
    }
    .flip-btn:active { transform: scale(0.97); }
    .flip-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .flip-btn.secondary {
      background: transparent;
      color: var(--text-sub);
      box-shadow: none;
      border: 1.5px solid rgba(0,0,0,0.1);
    }
    .flip-btn.secondary:hover {
      background: rgba(0,0,0,0.03);
      box-shadow: none;
    }

    /* === 키프레임 === */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes floatDeco {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
    }

    @keyframes coinFlip {
      0% {
        transform: rotateY(0deg) translateY(0);
      }
      20% {
        transform: rotateY(720deg) translateY(-60px);
      }
      50% {
        transform: rotateY(1800deg) translateY(-80px);
      }
      80% {
        transform: rotateY(2520deg) translateY(-20px);
      }
      100% {
        transform: rotateY(var(--final-rotation)) translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 로드 애니메이션 */
    .anim-in {
      opacity: 0;
      animation: fadeInUp 0.6s ease forwards;
    }
    .anim-delay-1 { animation-delay: 0.1s; }
    .anim-delay-2 { animation-delay: 0.25s; }
    .anim-delay-3 { animation-delay: 0.4s; }
    .anim-delay-4 { animation-delay: 0.55s; }

    /* === 반응형 === */
    @media (min-width: 481px) {
      .container { padding: 0 40px; }
      .hero-title { font-size: 40px; }
      .coin { --coin-size: 220px; }
    }

    @media (max-width: 380px) {
      .hero-title { font-size: 30px; }
      .coin { --coin-size: 170px; }
      .flip-coin { --coin-size: 210px; }
      .quote-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <!-- 장식 도형 -->
  <div class="deco deco-1"></div>
  <div class="deco deco-2"></div>
  <div class="deco deco-3"></div>
  <div class="deco deco-4"></div>

  <!-- 랜딩 페이지 -->
  <div id="landing">
    <div class="container">
      <!-- Hero -->
      <div class="hero anim-in anim-delay-1">
        <h1 class="hero-title">
          <span class="accent">고민 그만,</span><br>행동하자
        </h1>
        <p class="hero-sub">최고의 결정은 결정을 내리는 것이다</p>
      </div>

      <!-- 캐릭터 동전 미리보기 -->
      <div class="coin-preview anim-in anim-delay-2">
        <div class="coin" onclick="showFlipScreen()">
          <div class="coin-inner">
            <div class="face">
              <div class="eye eye-left"></div>
              <div class="eye eye-right"></div>
              <div class="cheek cheek-left"></div>
              <div class="cheek cheek-right"></div>
              <div class="mouth"></div>
            </div>
            <span class="coin-label">FLIP ME</span>
          </div>
        </div>
        <p class="coin-hint">동전을 눌러 결정하세요</p>
      </div>

      <!-- 인용문 카드 -->
      <div class="quote-card anim-in anim-delay-3">
        <p class="quote-text">
          오랜 시간 고민만 하며 멈춰 있는 것보다,<br>
          단순한 행위로라도 결정을 내리고 실행에 옮기는 것이<br>
          더 큰 행복감을 준다.
        </p>
        <p class="quote-author">— 스티븐 레빗, 시카고대 경제학 교수</p>
        <div class="stat-badge">63%가 실행하고 행복도가 높아졌다</div>
      </div>

      <!-- CTA -->
      <div class="cta-section anim-in anim-delay-4">
        <button class="cta-btn" onclick="showFlipScreen()">
          <span class="coin-icon">🪙</span>
          동전 던지기
        </button>
      </div>
    </div>
  </div>

  <!-- 동전 뒤집기 화면 -->
  <div id="flip-screen" class="hidden">
    <button class="back-btn" onclick="showLanding()">←</button>

    <div class="guidance" id="guidance">
      <p class="guidance-text">마음속으로 고민을 떠올리세요</p>
      <p class="guidance-sub">준비됐으면 아래 버튼을 눌러주세요</p>
    </div>

    <div class="flip-coin-wrapper">
      <div class="flip-coin" id="flipCoin">
        <!-- 앞면 (해봐!) -->
        <div class="flip-coin-face coin-front">
          <div class="coin-inner-flip">
            <div class="face">
              <div class="eye eye-left"></div>
              <div class="eye eye-right"></div>
              <div class="cheek cheek-left"></div>
              <div class="cheek cheek-right"></div>
              <div class="mouth"></div>
            </div>
            <span class="coin-label-flip">해봐!</span>
          </div>
        </div>
        <!-- 뒷면 (하지마!) -->
        <div class="flip-coin-face coin-back">
          <div class="coin-inner-flip">
            <div class="face face-back">
              <div class="eye eye-left"></div>
              <div class="eye eye-right"></div>
              <div class="cheek cheek-left"></div>
              <div class="cheek cheek-right"></div>
              <div class="mouth"></div>
            </div>
            <span class="coin-label-flip">하지마!</span>
          </div>
        </div>
      </div>
    </div>

    <div class="result" id="result">
      <p class="result-text" id="resultText"></p>
      <p class="result-message" id="resultMessage"></p>
      <p class="result-encourage" id="resultEncourage"></p>
    </div>

    <div class="actions">
      <button class="flip-btn" id="flipBtn" onclick="flipCoin()">동전 던지기</button>
      <button class="flip-btn secondary" id="resetBtn" onclick="resetCoin()" style="display:none;">다시 던지기</button>
    </div>
  </div>

  <script>
    // 격려 메시지
    const encourageMessages = [
      '과정을 믿어라.',
      '당신의 길이 정해졌다.',
      '이제 행동할 때다.',
      '결정이 내려졌다.',
      '행동이 절망의 해독제다.',
      '때로는 그냥 선택하는 것이 최고의 선택이다.',
    ];

    // 화면 전환
    function showFlipScreen() {
      document.getElementById('landing').classList.add('hidden');
      document.getElementById('flip-screen').classList.remove('hidden');
      resetCoin();
    }

    function showLanding() {
      document.getElementById('flip-screen').classList.add('hidden');
      document.getElementById('landing').classList.remove('hidden');
    }

    // 동전 뒤집기
    function flipCoin() {
      const coin = document.getElementById('flipCoin');
      const flipBtn = document.getElementById('flipBtn');
      const resetBtn = document.getElementById('resetBtn');
      const resultText = document.getElementById('resultText');
      const resultMessage = document.getElementById('resultMessage');
      const resultEncourage = document.getElementById('resultEncourage');
      const guidance = document.getElementById('guidance');

      // 초기화
      flipBtn.disabled = true;
      resultText.classList.remove('show', 'heads', 'tails');
      resultMessage.classList.remove('show');
      resultEncourage.classList.remove('show');
      guidance.style.opacity = '0.3';

      // 결과 결정
      const isHeads = Math.random() > 0.5;
      // 앞면 = 짝수 반바퀴 (0, 360, 720...) → 2880deg
      // 뒷면 = 홀수 반바퀴 → 2880 + 180 = 3060deg
      const finalRotation = isHeads ? '2880deg' : '3060deg';
      coin.style.setProperty('--final-rotation', finalRotation);

      // 이전 애니메이션 제거 후 재적용
      coin.classList.remove('flipping');
      void coin.offsetWidth; // reflow
      coin.classList.add('flipping');

      // 2초 후 결과 표시
      setTimeout(() => {
        if (isHeads) {
          resultText.textContent = '해봐!';
          resultText.classList.add('heads');
          resultMessage.textContent = '동전이 말했어요 — 도전하세요!';
        } else {
          resultText.textContent = '하지마!';
          resultText.classList.add('tails');
          resultMessage.textContent = '동전이 말했어요 — 이번엔 쉬어가세요.';
        }

        const encourage = encourageMessages[Math.floor(Math.random() * encourageMessages.length)];
        resultEncourage.textContent = `"${encourage}"`;

        resultText.classList.add('show');
        resultMessage.classList.add('show');
        resultEncourage.classList.add('show');

        flipBtn.style.display = 'none';
        resetBtn.style.display = 'inline-flex';
      }, 2100);
    }

    // 리셋
    function resetCoin() {
      const coin = document.getElementById('flipCoin');
      const flipBtn = document.getElementById('flipBtn');
      const resetBtn = document.getElementById('resetBtn');
      const resultText = document.getElementById('resultText');
      const resultMessage = document.getElementById('resultMessage');
      const resultEncourage = document.getElementById('resultEncourage');
      const guidance = document.getElementById('guidance');

      coin.classList.remove('flipping');
      coin.style.setProperty('--final-rotation', '0deg');
      coin.style.transform = 'rotateY(0deg)';

      resultText.classList.remove('show', 'heads', 'tails');
      resultMessage.classList.remove('show');
      resultEncourage.classList.remove('show');

      flipBtn.disabled = false;
      flipBtn.style.display = 'inline-flex';
      resetBtn.style.display = 'none';
      guidance.style.opacity = '1';
    }
  </script>
</body>
</html>
