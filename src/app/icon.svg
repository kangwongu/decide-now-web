<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE135"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="f" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE880"/>
      <stop offset="100%" stop-color="#F5B731"/>
    </linearGradient>
  </defs>
  <!-- 외곽 원 -->
  <circle cx="50" cy="50" r="48" fill="url(#g)"/>
  <!-- 테두리 링 -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="2"/>
  <!-- 내부 원 -->
  <circle cx="50" cy="50" r="38" fill="url(#f)"/>
  <!-- 왼쪽 눈 -->
  <ellipse cx="36" cy="40" rx="4" ry="5" fill="#5D4E37"/>
  <circle cx="38" cy="38" r="1.5" fill="white"/>
  <!-- 오른쪽 눈 -->
  <ellipse cx="64" cy="40" rx="4" ry="5" fill="#5D4E37"/>
  <circle cx="66" cy="38" r="1.5" fill="white"/>
  <!-- 왼쪽 볼터치 -->
  <ellipse cx="28" cy="52" rx="7" ry="4" fill="rgba(252,165,165,0.5)"/>
  <!-- 오른쪽 볼터치 -->
  <ellipse cx="72" cy="52" rx="7" ry="4" fill="rgba(252,165,165,0.5)"/>
  <!-- 입 (미소) -->
  <path d="M 40 56 Q 50 66 60 56" fill="none" stroke="#5D4E37" stroke-width="2.5" stroke-linecap="round"/>
</svg>
